<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bengaluru House Price Predictor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0c29;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
      color: white;
    }

    /* --- Header --- */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .header p {
      color: #aaa;
      margin-top: 8px;
      font-size: 1rem;
    }
    .badge {
      display: inline-block;
      background: rgba(247,151,30,0.15);
      border: 1px solid rgba(247,151,30,0.4);
      color: #ffd200;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      margin-top: 10px;
    }

    /* --- Card --- */
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 36px 32px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* --- Form --- */
    .form-group { margin-bottom: 22px; }
    label {
      display: block;
      font-size: 0.85rem;
      color: #ccc;
      margin-bottom: 8px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    select, input[type="number"] {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s, background 0.2s;
    }
    select:focus, input:focus {
      border-color: #f7971e;
      background: rgba(247,151,30,0.1);
    }
    select option { background: #302b63; color: white; }

    /* --- Slider row --- */
    .slider-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .slider-group label { display: flex; justify-content: space-between; }
    .slider-group label span {
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }
    input[type="range"] {
      width: 100%;
      margin-top: 6px;
      accent-color: #f7971e;
      cursor: pointer;
    }

    /* --- Button --- */
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      border: none;
      border-radius: 14px;
      color: #1a1a2e;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn:active { transform: scale(0.98); }

    /* --- Result Box --- */
    .result-box {
      display: none;
      margin-top: 28px;
      background: linear-gradient(135deg, rgba(247,151,30,0.15), rgba(255,210,0,0.1));
      border: 1px solid rgba(247,151,30,0.4);
      border-radius: 18px;
      padding: 28px 24px;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }
    .result-box .label { font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .result-box .price {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 8px 0 4px;
    }
    .result-box .sub { font-size: 0.9rem; color: #bbb; }
    .result-details {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .detail-chip {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      color: #ddd;
    }

    /* --- Loading spinner --- */
    .loading { display: none; text-align: center; margin-top: 16px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #f7971e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    /* --- Stats bar --- */
    .stats-bar {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      width: 100%;
      max-width: 540px;
    }
    .stat {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
    }
    .stat .num { font-size: 1.4rem; font-weight: 800; color: #ffd200; }
    .stat .desc { font-size: 0.72rem; color: #888; margin-top: 4px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="header">
    <h1>🏠 House Price Predictor</h1>
    <p>Bengaluru Real Estate — AI Powered Estimates</p>
    <div class="badge">🤖 Linear Regression Model · 13,000+ Data Points</div>
  </div>

  <div class="card">
    <!-- Location -->
    <div class="form-group">
      <label>📍 Location</label>
      <select id="location">
        {% for loc in locations %}
        <option value="{{ loc }}">{{ loc }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Sqft -->
    <div class="form-group">
      <label>📐 Total Square Feet</label>
      <input type="number" id="sqft" placeholder="e.g. 1200" min="200" max="10000" value="1200"/>
    </div>

    <!-- Sliders -->
    <div class="slider-row">
      <div class="slider-group form-group">
        <label>🛏 BHK <span id="bhk-val">2</span></label>
        <input type="range" id="bhk" min="1" max="6" value="2" oninput="document.getElementById('bhk-val').textContent=this.value"/>
      </div>
      <div class="slider-group form-group">
        <label>🚿 Bathrooms <span id="bath-val">2</span></label>
        <input type="range" id="bath" min="1" max="6" value="2" oninput="document.getElementById('bath-val').textContent=this.value"/>
      </div>
    </div>

    <!-- Balcony -->
    <div class="slider-group form-group">
      <label>🌿 Balconies <span id="balcony-val">1</span></label>
      <input type="range" id="balcony" min="0" max="3" value="1" oninput="document.getElementById('balcony-val').textContent=this.value"/>
    </div>

    <button class="btn" onclick="predict()">⚡ Predict Price</button>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>

    <!-- Result -->
    <div class="result-box" id="result">
      <div class="label">Estimated Price</div>
      <div class="price" id="price-text">—</div>
      <div class="sub">Lakhs (Indian Rupees)</div>
      <div class="result-details" id="result-details"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat"><div class="num">13K+</div><div class="desc">Properties Trained</div></div>
    <div class="stat"><div class="num">30+</div><div class="desc">Locations</div></div>
    <div class="stat"><div class="num">56%</div><div class="desc">Model Accuracy (R²)</div></div>
  </div>

  <script>
    async function predict() {
      const location = document.getElementById("location").value;
      const sqft    = document.getElementById("sqft").value;
      const bhk     = document.getElementById("bhk").value;
      const bath    = document.getElementById("bath").value;
      const balcony = document.getElementById("balcony").value;

      if (!sqft || sqft < 100) {
        alert("Please enter a valid square footage (min 100).");
        return;
      }

      document.getElementById("loading").style.display = "block";
      document.getElementById("result").style.display  = "none";

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ location, sqft, bath, balcony, bhk })
        });
        const data = await res.json();

        document.getElementById("price-text").textContent = `₹ ${data.price}`;
        document.getElementById("result-details").innerHTML = `
          <div class="detail-chip">📍 ${location}</div>
          <div class="detail-chip">📐 ${sqft} sq.ft</div>
          <div class="detail-chip">🛏 ${bhk} BHK</div>
          <div class="detail-chip">🚿 ${bath} Bath</div>
        `;
        document.getElementById("result").style.display = "block";
      } catch (err) {
        alert("Error connecting to server. Make sure app.py is running.");
      }

      document.getElementById("loading").style.display = "none";
    }
  </script>
</body>
</html>
